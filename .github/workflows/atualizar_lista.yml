name: Atualizar Lista VOD com TMDb

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Roda diariamente à meia-noite
  workflow_dispatch:      # Permite acionamento manual

permissions:
  contents: write         # Permissão necessária para fazer push no repositório

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Garante autenticação para push
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Executar Processador
        run: python processador.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_KEY }}

      - name: Commit e Push das alterações
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Puxa alterações remotas para evitar conflitos
          git pull --rebase origin main || true
          
          git add lista_final_vod.m3u
          
          # Verifica se há mudanças antes de commitar
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: Lista com Posters TMDb [${{ github.run_id }}]"
            git push origin main
          else
            echo "Nenhuma alteração detectada na lista."
          fi
