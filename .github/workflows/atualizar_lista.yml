name: Atualizar Lista VOD com TMDb

on:
  push:
    branches: [ main ]
  schedule:
    - [span_0](start_span)cron: '0 0 * * *' # Roda automaticamente todo dia à meia-noite[span_0](end_span)
  [span_1](start_span)workflow_dispatch: # Permite que você rode manualmente pelo botão "Run workflow"[span_1](end_span)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      [span_2](start_span)uses: actions/checkout@v3 # Baixa o código do seu repositório para a máquina virtual[span_2](end_span)

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        [span_3](start_span)python-version: '3.9'[span_3](end_span)

    - name: Instalar Dependências
      [span_4](start_span)run: pip install requests # Instala a biblioteca necessária para o TMDb[span_4](end_span)

    - name: Executar Processador
      run: python processador.py
      env:
        # [span_5](start_span)Puxa o código secreto que você salvou nas configurações do GitHub[span_5](end_span)
        TMDB_API_KEY: ${{ secrets.TMDB_KEY }} 

    - name: Salvar alterações
      run: |
        [span_6](start_span)git config --global user.name "GitHub Action"[span_6](end_span)
        [span_7](start_span)git config --global user.email "action@github.com"[span_7](end_span)
        [span_8](start_span)git add lista_final_vod.m3u[span_8](end_span)
        # [span_9](start_span)O comando abaixo evita que o erro pare o processo se não houver mudanças na lista[span_9](end_span)
        [span_10](start_span)git commit -m "Auto-update: Lista com Posters TMDb" || exit 0[span_10](end_span)
        [span_11](start_span)git push[span_11](end_span)
