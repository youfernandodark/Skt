name: 🎬 Gerar VOD Automático

on:
  push:
    paths:
      - 'automacao_vod/links_brutos.txt'
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Forçar atualização mesmo sem mudanças'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 🎬 Rodar Processador VOD
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          echo "⚙️ Iniciando processamento..."
          python automacao_vod/processador.py
          echo "✅ Processamento concluído!"
      
      - name: 📊 Verificar Alterações
        id: verify
        run: |
          git diff --exit-code automacao_vod/lista_final_vod.m3u || echo "changes=true" >> $GITHUB_OUTPUT
      
      - name: 💾 Commit e Push
        if: steps.verify.outputs.changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "VOD Bot"
          git config --global user.email "vod-bot@github.com"
          git add automacao_vod/lista_final_vod.m3u
          git commit -m "🔄 [AUTO] Lista VOD atualizada - $(date '+%Y-%m-%d %H:%M:%S')" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📤 Upload de Artefato
        uses: actions/upload-artifact@v4
        with:
          name: lista-vod-m3u
          path: automacao_vod/lista_final_vod.m3u
          retention-days: 30
      
      - name: 🔔 Notificar Conclusão
        run: |
          echo "✅ Workflow concluído com sucesso!"
          echo "📁 Arquivo gerado: automacao_vod/lista_final_vod.m3u"
