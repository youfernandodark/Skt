name: 🎬 Gerar VOD Automático

on:
  push:
    paths:
      - 'automacao_vod/links_brutos.txt'
      - 'automacao_vod/links_series.txt' # Adicionado para monitorar séries
    branches:
      - main
      - master
  workflow_dispatch: # Permite execução manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Importante para git push
      
      - name: 🐍 Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 📦 Instalar Dependências
        run: pip install requests
      
      - name: 🎬 Rodar Processador
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python automacao_vod/processador.py
      
      - name: 💾 Commit e Push
        run: |
          git config --global user.name "VOD Bot"
          git config --global user.email "vod-bot@users.noreply.github.com"
          git add automacao_vod/lista_final_vod.m3u
          git diff --cached --quiet && echo "Sem mudanças" || (
            git commit -m "🔄 [AUTO] Lista VOD atualizada"
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # CORRIGIDO
      
      - name: 📤 Upload Artefato
        uses: actions/upload-artifact@v4
        with:
          name: lista-vod
          path: automacao_vod/lista_final_vod.m3u
