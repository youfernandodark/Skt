name: Automação VOD e TV ao Vivo

on:
  push:
    paths:
      - 'automacao_vod/links_tv.txt'
      - 'automacao_vod/links_filmes.txt'
      - 'automacao_vod/links_series.txt'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do Repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Instalar Dependencias
        run: pip install requests

      - name: Executar Processador
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          EPG_URL: "https://epgshare01.online,https://iptv-epg.org/"
        run: python automacao_vod/processador.py

      - name: Commit e Push Automatico
        run: |
          git config --global user.name "VOD Bot"
          git config --global user.email "vod-bot@users.noreply.github.com"
          git add automacao_vod/lista_final_vod.m3u
          if ! git diff --cached --quiet; then
            git commit -m "[AUTO] Atualizacao da Lista VOD/TV"
            git push
          else
            echo "Nenhuma alteracao detectada."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
