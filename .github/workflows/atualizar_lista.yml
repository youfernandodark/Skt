name: Gerar Playlist Unificada

on:
  push:
    branches: [ main, develop ]
  schedule:
    # Executa diariamente às 3:00 AM
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Permite execução manual

jobs:
  gerar-playlist:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Executar gerador de playlist
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python gerador.py --output lista_final.m3u
      
      - name: Validar arquivo gerado
        run: |
          if [ ! -f lista_final.m3u ]; then
            echo "Erro: Arquivo lista_final.m3u não foi gerado!"
            exit 1
          fi
          echo "Arquivo gerado com sucesso:"
          wc -l lista_final.m3u
      
      - name: Commit e push das alterações
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "bot@github.com"
          git add lista_final.m3u
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "🤖 Atualização automática da playlist - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          )
      
      - name: Criar release (opcional)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: playlist-${{ github.run_number }}
          name: Playlist ${{ github.run_number }}
          body: |
            Playlist gerada automaticamente em $(date '+%d/%m/%Y %H:%M:%S')
            
            **Estatísticas:**
            - Total de itens: $(grep -c "^#EXTINF" lista_final.m3u || echo 0)
          files: lista_final.m3u
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
