name: Atualizar Lista VOD com TMDb

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado para v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Executar Processador
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }} # Ajuste conforme o nome no seu GitHub Secrets
        run: python processador.py

      - name: Commit e Push das alterações
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: Lista TMDb"
            git push origin main
          else
            echo "Nada para atualizar."
          fi
