name: Gerar VOD Automatico

on:
  push:
    paths:
      - 'automacao_vod/links_brutos.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - run: pip install requests

      - name: Rodar Processador
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python automacao_vod/processador.py

      - name: Commit e Push
        run: |
          git config --global user.name "Bot VOD"
          git config --global user.email "bot@vod.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add lista_final_vod.m3u
          git commit -m "Lista atualizada automaticamente [ci skip]" || exit 0
          git push
