name: 🎬 Automação VOD e TV ao Vivo

on:
  push:
    paths:
      - 'automacao_vod/links_tv.txt'
      - 'automacao_vod/links_filmes.txt'
      - 'automacao_vod/links_series.txt'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 📦 Instalar Dependências
        run: pip install requests

      - name: 🎬 Rodar Processador
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python automacao_vod/processador.py

      - name: 💾 Commit e Push
        run: |
          git config --global user.name "VOD Bot"
          git config --global user.email "vod-bot@users.noreply.github.com"
          git add automacao_vod/lista_final_vod.m3u
          git diff --cached --quiet || (
            git commit -m "🔄 [AUTO] Lista Final Atualizada com Sinopses e EPG"
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
